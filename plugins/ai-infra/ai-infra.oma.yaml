# OMA Harness DSL for the ai-infra plugin.
#
# Scope: ai-infra is the AI runtime infrastructure layer. Today the
# shipped skills target EKS + vLLM + kgateway + Langfuse + GPU + guardrails
# (self-hosted open-source stack). The MCP server set also includes
# Bedrock AgentCore, Bedrock KB retrieval, and SageMaker AI in
# anticipation of managed-runtime skills landing in a later release.
#
# This file is the single source of truth for:
#   - Claude Code MCP servers  ->  plugins/ai-infra/.mcp.json
#   - Kiro agent profile       ->  plugins/ai-infra/kiro-agents/ai-infra.agent.json
#
# Do NOT hand-edit the two files above. Instead:
#   1. Edit this file.
#   2. Run `python3 -m tools.oma_compile plugins/ai-infra/ai-infra.oma.yaml`.
#   3. Commit all three files together. CI enforces drift via `oma compile --check`.

version: 2
plugin: ai-infra

metadata:
  labels:
    aidlc-phase: construction
    cost-tier: high
    compliance-required: "true"

# ---------------------------------------------------------------------------
# MCP servers (pinned to exact PyPI versions for supply-chain safety)
# ---------------------------------------------------------------------------
mcp:
  # Every awslabs MCP below is backed by boto3. Without AWS_REGION the
  # server may fail startup (cloudwatch, aws-knowledge) or fail on first
  # API call. Default to us-east-1; override by exporting AWS_REGION /
  # AWS_DEFAULT_REGION in the shell, or editing this file.
  aws-documentation:
    command: uvx
    args: ["awslabs.aws-documentation-mcp-server==1.1.21"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  eks:
    command: uvx
    args: ["awslabs.eks-mcp-server==0.1.28"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  bedrock-agentcore:
    command: uvx
    args: ["awslabs.amazon-bedrock-agentcore-mcp-server==0.0.17"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  bedrock-kb-retrieval:
    command: uvx
    args: ["awslabs.bedrock-kb-retrieval-mcp-server==1.0.20"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  sagemaker-ai:
    command: uvx
    args: ["awslabs.sagemaker-ai-mcp-server==1.0.8"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  cloudwatch:
    command: uvx
    args: ["awslabs.cloudwatch-mcp-server==0.0.25"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  prometheus:
    command: uvx
    args: ["awslabs.prometheus-mcp-server==0.2.15"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  aws-iac:
    command: uvx
    args: ["awslabs.aws-iac-mcp-server==1.0.17"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  aws-pricing:
    command: uvx
    args: ["awslabs.aws-pricing-mcp-server==1.0.28"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  well-architected-security:
    command: uvx
    args: ["awslabs.well-architected-security-mcp-server==0.1.7"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000
  aws-knowledge:
    command: uvx
    args: ["awslabs.aws-knowledge-mcp-server==0.1.0"]
    env:
      FASTMCP_LOG_LEVEL: ERROR
      AWS_REGION: us-east-1
    timeout: 120000

# ---------------------------------------------------------------------------
# Agents — Kiro agent profile emitted from this section.
# ---------------------------------------------------------------------------
agents:
  - id: ai-infra
    runtime: kiro
    description: "AI runtime infrastructure architect for AWS (EKS + vLLM + Inference Gateway + Langfuse today; Bedrock / SageMaker runtime skills planned)."
    tools: ["*"]
    mcp:
      - eks
      - aws-documentation
      - aws-pricing
      - cloudwatch
    mcpEnvOverrides:
      aws-documentation:
        FASTMCP_LOG_LEVEL: ERROR
        AWS_DOCUMENTATION_PARTITION: aws
    resources:
      - "file://.kiro/steering/oma-hub.md"
      - "skill://.kiro/skills/ai-infra/**/*.md"
    notes:
      eks_mcp_flags: "By default this profile does NOT pass --allow-write or --allow-sensitive-data-access to awslabs.eks-mcp-server. The server therefore runs read-only. `autoApprove.readOnly: true` then accurately reflects what the agent can do. To opt in to destructive operations, edit mcpEnvOverrides.eks or the emitted agent.json — that is an explicit, auditable change, not a silent default."
    ontology:
      produces: [Deployment]
      consumes: [Spec, ADR]
    welcomeMessage: |-
      Hello! I'm the AI Infra Agent 🚀

      ⚠️  SECURITY NOTE
        This profile runs the awslabs EKS MCP server in READ-ONLY mode by default.
        Destructive operations (create/update/delete EKS resources) and access to
        sensitive fields (secrets, private keys, IAM policy docs) are DISABLED.
        To enable write + sensitive-data access, export
          OMA_EKS_MCP_ALLOW_WRITE=1
          OMA_EKS_MCP_ALLOW_SENSITIVE=1
        before starting this agent, and add `--allow-write` / `--allow-sensitive-data-access`
        flags to the eks-mcp-server args. Do NOT enable these for customer-facing demos.

      📌 **Capabilities**
        • Design and architect agentic AI platforms on EKS
        • Deploy vLLM model serving with GPU optimization
        • Configure inference gateways (LiteLLM, Bifrost, Helicone)
        • Set up observability stack (Langfuse, Prometheus, Grafana)
        • Implement MLOps pipelines and cost governance

      📋 **Common Workflows**
        • Platform Bootstrap: Full EKS + GPU + Karpenter + vLLM stack
        • Model Deployment: Custom model serving with LoRA/MoE support
        • Gateway Setup: 2-tier routing with semantic caching
        • Monitoring: Langfuse + OpenTelemetry integration

      Let's build your agentic platform. What would you like to start with?

# ---------------------------------------------------------------------------
# Hooks — declared-only. The shell scripts remain hand-authored.
# ---------------------------------------------------------------------------
hooks:
  # Plugin-bundled, self-contained SessionStart hook (#60). Injects active
  # ontology state (.omao/ontology). Bundled INSIDE the plugin so /plugin
  # install ships it; the repo-root hooks/session-start.sh (Tier-0 mode +
  # project-memory + permissions-drift) remains the richer CLI/dev-install
  # variant registered by scripts/install/claude.sh.
  session-start:
    runs: hooks/session-start-ontology.sh

# ---------------------------------------------------------------------------
# Keyword triggers (merged into .omao/triggers.json by the compiler).
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Workflows (v2) — DAG-based execution plans validated at compile time.
# ---------------------------------------------------------------------------
workflows:
  platform-bootstrap:
    description: "Full EKS + GPU + vLLM + Langfuse bootstrap with preflight checks and rollback."
    steps:
      - id: preflight
        agent_ref: ai-infra
      - id: provision
        agent_ref: ai-infra
        depends_on: [preflight]
        on_failure: rollback
      - id: verify
        skill_ref: agentic-eks-bootstrap
        depends_on: [provision]

# ---------------------------------------------------------------------------
# Telemetry (v2) — OpenTelemetry endpoints for traces, metrics, logs.
# ---------------------------------------------------------------------------
telemetry:
  traces:
    endpoint: http://langfuse.ops.svc.cluster.local:4317
    protocol: grpc
    sampler: parentbased_traceidratio
    sampler_ratio: 0.1
  metrics:
    endpoint: http://otel-collector.ops.svc.cluster.local:4318
    interval_seconds: 30

# ---------------------------------------------------------------------------
# Policies (v2) — declarative runtime enforcement. Compiled into
# hooks/harness-rules.json + a PreToolUse entry in hooks/hooks.json, enforced
# by tools/oma_harness/enforce.py before a tool runs. Pure Claude Code; no OPA.
# ---------------------------------------------------------------------------
policies:
  - id: deny-eks-mutating-kubectl
    severity: blocking
    phase: [construction, operations]
    description: "Block mutating kubectl verbs; EKS writes require an approved Deployment and an explicit operator-run command."
    enforce:
      tool: Bash
      deny_if:
        command_matches: "kubectl\\s+(apply|create|delete|edit|patch|replace|scale|autoscale|set|rollout|expose|run|exec|annotate|label|taint|cordon|drain|uncordon)\\b"
      decision: deny
      reason: "Harness: mutating/interactive kubectl is blocked. Provision via an approved Deployment + the platform-bootstrap workflow, or have the operator run it directly."
  - id: deny-eks-mcp-write
    severity: blocking
    phase: [construction, operations]
    description: "Block EKS MCP write/mutation tools; the bundled agent runs read-only by default."
    enforce:
      deny_if:
        input_field:
          path: command
          matches: "eks.*--allow-write|--allow-sensitive-data-access"
      decision: deny
      reason: "Harness: EKS MCP write access is disabled by default. Enable --allow-write explicitly and audit the change before re-running."
  - id: deny-secret-file-write
    severity: blocking
    phase: [construction, operations]
    description: "Block Write to secret-bearing files (.env, secrets/, *.pem, kubeconfig)."
    enforce:
      tool: Write
      deny_if:
        file_path_matches: "(^|/)\\.env(\\.|$)|(^|/)secrets?/|\\.pem$|(^|/)kubeconfig$"
      decision: deny
      reason: "Harness: writing secret-bearing files is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."
  - id: deny-secret-file-edit
    severity: blocking
    phase: [construction, operations]
    description: "Block Edit to secret-bearing files (closes the Write-only bypass)."
    enforce:
      tool: Edit
      deny_if:
        file_path_matches: "(^|/)\\.env(\\.|$)|(^|/)secrets?/|\\.pem$|(^|/)kubeconfig$"
      decision: deny
      reason: "Harness: editing secret-bearing files is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."
  - id: deny-secret-file-shell-redirect
    severity: blocking
    phase: [construction, operations]
    description: "Block shell redirection / tee into secret-bearing files (closes the Bash bypass)."
    enforce:
      tool: Bash
      deny_if:
        command_matches: "(>>?|tee\\b|dd\\b|cp\\b|mv\\b)[^|;&]*(\\.env(\\.|\\b)|secrets?/|\\.pem\\b|kubeconfig\\b)"
      decision: deny
      reason: "Harness: writing secret-bearing files via the shell is blocked. Use a secrets manager (e.g. External Secrets, SSM) instead of committing secrets."

# ---------------------------------------------------------------------------
# Keyword triggers (merged into .omao/triggers.json by the compiler).
# ---------------------------------------------------------------------------
triggers:
  - id: platform-bootstrap
    keywords: ["platform-bootstrap", "eks-agentic"]
    context_required: []
    command: /oma:platform-bootstrap
    description: "Bootstrap the Agentic AI Platform on EKS with the 5-checkpoint workflow."
